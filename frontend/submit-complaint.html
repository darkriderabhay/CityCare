<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - CityCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="index.html"><h2 class="name">🏙️ City<span>Care</span></h2></a>
            </div>

            <!-- Hamburger Button -->
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="navMenu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="submit-complaint.html" class="active">Submit Complaint</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Complaint Form -->
    <div class="form-container">
        <h2>Submit New Complaint</h2>
        
        <div id="alertBox"></div>

        <form id="complaintForm">
            <div class="form-group">
                <label for="title">Complaint Title *</label>
                <input type="text" id="title" name="title" required placeholder="Brief description of the issue">
            </div>

            <div class="form-group">
                <label for="description">Detailed Description *</label>
                <textarea id="description" name="description" required placeholder="Provide detailed information about the issue"></textarea>
            </div>

            <div class="form-group">
                <label for="location">Location *</label>
                <input type="text" id="location" name="location" required placeholder="Exact location of the issue">
            </div>
            
            <div class="form-group">
                <label for="image">Upload Image (Optional)</label>
                <input type="file" id="image" name="image" accept="image/*">
                <small style="color: #666;">Max size: 5MB. Formats: JPG, PNG, GIF</small>
            </div>

            <div class="form-group">
                <label for="dept_id">Department</label>
                <select id="dept_id" name="dept_id">
                    <option value="">Select Department (Optional)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Submit Complaint</button>
        </form>

        <div class="form-text">
            <p><a href="dashboard.html">← Back to Dashboard</a></p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 CityCare - Online Civic Issue Reporting System</p>
        </div>
    </footer>
    <script src="js/navbar.js"></script>
    <script src="js/submit-complaint.js"></script>
</body>
</html>
